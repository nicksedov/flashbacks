    CalendarAllDatesResponse:
      type: object
      properties:
        minDate:
          type: string
        maxDate:
          type: string
        dates:
          type: array
          items:
            $ref: "#/components/schemas/TimelineDateMarker"

    TimelineDateMarker:
      type: object
      properties:
        date:
          type: string
        count:
          type: integer

    CalendarSeekResponse:
      type: object
      properties:
        cursor:
          type: string
        page:
          type: integer

    GeoClustersResponse:
