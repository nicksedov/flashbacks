components:
  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: session_id
    csrfToken:
      type: apiKey
      in: header
      name: X-CSRF-Token

  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: healthy
        version:
          type: string
          example: "1.0.0"
        databaseConnected:
          type: boolean
        uptime:
          type: string

    AuthStatusResponse:
      type: object
      properties:
        isAuthenticated:
          type: boolean
        bootstrapRequired:
          type: boolean
        user:
          $ref: "#/components/schemas/User"

    LoginRequest:
      type: object
      required:
        - login
        - password
      properties:
        login:
          type: string
        password:
          type: string
          format: password

    LoginResponse:
      type: object
      properties:
        success:
          type: boolean
        user:
          $ref: "#/components/schemas/User"

    BootstrapSetupRequest:
      type: object
      required:
        - newPassword
      properties:
        newPassword:
          type: string
          format: password
        displayName:
          type: string

    ChangePasswordRequest:
      type: object
      required:
        - oldPassword
        - newPassword
      properties:
        oldPassword:
          type: string
          format: password
        newPassword:
          type: string
          format: password

    UpdateProfileRequest:
      type: object
      required:
        - displayName
      properties:
        displayName:
          type: string

    User:
      type: object
      properties:
        id:
          type: integer
        login:
          type: string
        displayName:
          type: string
        avatarUrl:
          type: string
        role:
          type: string
          enum: [admin, user]
        createdAt:
          type: string
          format: date-time

    ScanResponse:
      type: object
      properties:
        message:
          type: string

    ScanStatus:
      type: object
      properties:
        running:
          type: boolean
        progress:
          type: number
        totalFiles:
          type: integer
        processedFiles:
          type: integer
        duplicatesFound:
          type: integer

    DuplicatesResponse:
      type: object
      properties:
        groups:
          type: array
          items:
            $ref: "#/components/schemas/DuplicateGroupDTO"
        total:
          type: integer
        page:
          type: integer

    DuplicateGroupDTO:
      type: object
      properties:
        index:
          type: integer
        hash:
          type: string
        size:
          type: integer
        files:
          type: array
          items:
            $ref: "#/components/schemas/FileDTO"

    FileDTO:
      type: object
      properties:
        id:
          type: integer
        path:
          type: string
        filename:
          type: string
        size:
          type: integer
        modTime:
          type: string
          format: date-time

    DeleteFilesRequest:
      type: object
      required:
        - filePaths
      properties:
        filePaths:
          type: array
          items:
            type: string

    DeleteFilesResponse:
      type: object
      properties:
        success:
          type: integer
        failed:
          type: integer
        failedFiles:
          type: array
          items:
            type: string

    MoveFilesRequest:
      type: object
      required:
        - filePaths
        - targetDir
      properties:
        filePaths:
          type: array
          items:
            type: string
        targetDir:
          type: string

    MoveFilesResponse:
      type: object
      properties:
        success:
          type: integer
        failed:
          type: integer
        failedFiles:
          type: array
          items:
            type: string

    FolderPatternsResponse:
      type: object
      properties:
        patterns:
          type: array
          items:
            $ref: "#/components/schemas/FolderPattern"
        totalDuplicates:
          type: integer

    FolderPattern:
      type: object
      properties:
        id:
          type: string
        folders:
          type: array
          items:
            type: string
        duplicateCount:
          type: integer

    BatchDeleteRequest:
      type: object
      required:
        - rules
      properties:
        rules:
          type: array
          items:
            $ref: "#/components/schemas/BatchDeleteRule"

    BatchDeleteRule:
      type: object
      properties:
        patternId:
          type: string
        keepFolder:
          type: string

    BatchDeleteResponse:
      type: object
      properties:
        rulesApplied:
          type: integer
        totalDeleted:
          type: integer
        errors:
          type: array
          items:
            type: string

    GalleryImagesResponse:
      type: object
      properties:
        images:
          type: array
          items:
            $ref: "#/components/schemas/GalleryImageDTO"
        total:
          type: integer
        page:
          type: integer

    GalleryImageDTO:
      type: object
      properties:
        id:
          type: integer
        path:
          type: string
        filename:
          type: string
        size:
          type: integer
        modTime:
          type: string
          format: date-time
        hasThumbnail:
          type: boolean
        width:
          type: integer
        height:
          type: integer

    GalleryCalendarResponse:
      type: object
      properties:
        groups:
          type: array
          items:
            $ref: "#/components/schemas/CalendarDateGroup"
        nextCursor:
          type: string

    CalendarDateGroup:
      type: object
      properties:
        date:
          type: string
          description: YYYY-MM-DD
        count:
          type: integer
        images:
          type: array
          items:
            $ref: "#/components/schemas/GalleryImageDTO"

    CalendarMonthInfo:
      type: object
      properties:
        year:
          type: integer
        month:
          type: integer
        days:
          type: array
          items:
            type: integer
