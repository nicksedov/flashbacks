        lastSyncNew:
          type: integer
        lastSyncUpdated:
          type: integer
        lastSyncDeleted:
          type: integer
        lastSyncThumbnails:
          type: integer

    UpdateSettingsRequest:
      type: object
      properties:
        trashDir:
          type: string
          nullable: true
        exifBackupDir:
          type: string
          nullable: true
        thumbnailCachePath:
          type: string
          nullable: true
        thumbnailCacheSize:
          type: integer
          nullable: true
        ocrConcurrentRequests:
          type: integer
          nullable: true
        syncDays:
          type: string
          nullable: true
        dailySyncHour:
          type: integer
          nullable: true
        dailySyncMinute:
          type: integer
          nullable: true
