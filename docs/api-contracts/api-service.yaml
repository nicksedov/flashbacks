openapi: "3.1.0"
info:
  title: Flashbacks API Service
  version: "1.1.0"
  description: |
    Core API for the Flashbacks application. Handles authentication, image scanning,
    duplicate detection, gallery management, OCR coordination, AI-powered features,
    tag/embedding management, and LLM-based image recognition.

servers:
  - url: http://localhost:5170
    description: Local development

security:
  - sessionAuth: []
  - csrfToken: []

paths:
  # ──────────────────────────────────────────────
  #  Public endpoints
  # ──────────────────────────────────────────────

  /api/health:
    get:
      summary: Service health check
      operationId: getHealth
      security: []
      responses:
        "200":
          description: Service health status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/auth/status:
    get:
      summary: Check authentication status
      operationId: getAuthStatus
      security: []
      responses:
        "200":
          description: Authentication status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthStatusResponse"

  /api/auth/login:
    post:
      summary: Login with credentials
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          headers:
            Set-Cookie:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials

  /api/auth/bootstrap/setup:
    post:
      summary: Bootstrap initial admin setup
      operationId: bootstrapSetup
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BootstrapSetupRequest"
      responses:
        "200":
          description: Bootstrap completed
        "400":
          description: Already bootstrapped or invalid

  # ──────────────────────────────────────────────
  #  Authenticated endpoints
  # ──────────────────────────────────────────────

  /api/auth/logout:
    post:
      summary: Logout current session
      operationId: logout
      responses:
        "200":
          description: Logout successful

  /api/auth/me:
    get:
      summary: Get current user info
      operationId: getCurrentUser
      responses:
        "200":
          description: Current user information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /api/auth/change-password:
    post:
      summary: Change current user password
      operationId: changePassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "200":
          description: Password changed

  /api/users/me:
    patch:
      summary: Update current user profile
      operationId: updateProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: Profile updated

  /api/users/me/avatar:
    post:
      summary: Upload avatar
      operationId: uploadAvatar
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                avatar:
                  type: string
                  format: binary
      responses:
        "200":
          description: Avatar uploaded
    delete:
      summary: Delete avatar
      operationId: deleteAvatar
      responses:
        "200":
          description: Avatar deleted

  /api/users/{id}/avatar:
    get:
      summary: Get user avatar
      operationId: getUserAvatar
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Avatar image
          content:
            image/jpeg:
              schema:
                type: string
                format: binary

  # ──────────────────────────────────────────────
  #  Scan & Duplicates
  # ──────────────────────────────────────────────

  /api/scan:
    post:
      summary: Start full scan for duplicates
      operationId: startScan
      responses:
        "202":
          description: Scan started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanResponse"

  /api/fast-scan:
    post:
      summary: Start fast scan (new/modified files only)
      operationId: startFastScan
      responses:
        "202":
          description: Fast scan started

  /api/status:
    get:
      summary: Get scan status
      operationId: getScanStatus
      responses:
        "200":
          description: Current scan status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanStatus"

  /api/duplicates:
    get:
      summary: Get duplicate groups
      operationId: getDuplicates
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Paginated duplicate groups
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DuplicatesResponse"

  /api/delete-files:
    post:
      summary: Delete files directly
      operationId: deleteFiles
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteFilesRequest"
      responses:
        "200":
          description: Files deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteFilesResponse"

  /api/move-files:
    post:
      summary: Move files to a target directory
      operationId: moveFiles
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MoveFilesRequest"
      responses:
        "200":
          description: Files moved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MoveFilesResponse"

  /api/folder-patterns:
    get:
      summary: Get folder patterns with duplicate counts
      operationId: getFolderPatterns
      responses:
        "200":
          description: Folder patterns
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FolderPatternsResponse"

  /api/batch-delete:
    post:
      summary: Batch delete duplicates by folder pattern rules
      operationId: batchDelete
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchDeleteRequest"
      responses:
        "200":
          description: Batch delete completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchDeleteResponse"

  # ──────────────────────────────────────────────
  #  Gallery & Folders
  # ──────────────────────────────────────────────

  /api/thumbnail:
    get:
      summary: Get image thumbnail
      operationId: getThumbnail
      parameters:
        - name: path
          in: query
          required: true
          schema:
            type: string
        - name: size
          in: query
          schema:
            type: integer
            default: 256
      responses:
        "200":
          description: Thumbnail image
          content:
            image/webp:
              schema:
                type: string
                format: binary

  /api/gallery:
    get:
      summary: Get gallery images
      operationId: getGallery
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: sort
          in: query
          schema:
            type: string
            enum: [date, name, size]
      responses:
        "200":
          description: Gallery images
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GalleryImagesResponse"

  /api/gallery/calendar:
    get:
      summary: Get calendar gallery with date-based grouping
      operationId: getGalleryCalendar
      parameters:
        - name: cursor
          in: query
          schema:
            type: string
          description: Pagination cursor from previous response
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 30
      responses:
        "200":
          description: Calendar groups
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GalleryCalendarResponse"
  /api/gallery/calendar/month:
    get:
      summary: Get calendar month info (days with images)
      operationId: getCalendarMonthInfo
      parameters:
        - name: year
          in: query
          required: true
          schema:
            type: integer
        - name: month
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Month info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarMonthInfo"

  /api/gallery/calendar/dates:
    get:
      summary: Get all calendar date markers
      operationId: getCalendarAllDates
      responses:
        "200":
          description: All dates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarAllDatesResponse"

  /api/gallery/calendar/seek:
    get:
      summary: Seek to a specific date in the calendar
      operationId: getCalendarSeek
      parameters:
        - name: date
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Seek cursor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarSeekResponse"

  /api/gallery/clusters:
    get:
      summary: Get geo clusters for map view
      operationId: getGalleryClusters
      parameters:
        - name: minLat
          in: query
          schema:
            type: number
        - name: maxLat
          in: query
          schema:
            type: number
        - name: minLng
          in: query
          schema:
            type: number
        - name: maxLng
          in: query
          schema:
            type: number
        - name: zoom
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Geo clusters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeoClustersResponse"

  /api/gallery/geo-images:
    get:
      summary: Get images within a geo bounding box
      operationId: getGeoImages
      parameters:
        - name: minLat
          in: query
          schema:
            type: number
        - name: maxLat
          in: query
          schema:
            type: number
        - name: minLng
          in: query
          schema:
            type: number
        - name: maxLng
          in: query
          schema:
            type: number
        - name: limit
          in: query
          schema:
            type: integer
            default: 200
      responses:
        "200":
          description: Geo images
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeoImagesResponse"

  /api/gallery/smart-search:
    get:
      summary: Semantic image search using embeddings combined with exact tag matching
      operationId: smartSearch
      parameters:
        - name: query
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
            maximum: 200
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SmartSearchResponse"

  /api/image:
    get:
      summary: Serve full-size image
      operationId: serveImage
      parameters:
        - name: path
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Image file
          content:
            image/jpeg:
              schema:
                type: string
                format: binary

  /api/ocr-image:
    get:
      summary: Serve OCR-annotated image
      operationId: serveOcrImage
      parameters:
        - name: path
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OCR-annotated image
          content:
            image/jpeg:
              schema:
                type: string
                format: binary

  # ──────────────────────────────────────────────
  #  Settings
  # ──────────────────────────────────────────────

  /api/settings:
    get:
      summary: Get application settings
      operationId: getSettings
      responses:
        "200":
          description: Application settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppSettingsDTO"
    put:
      summary: Update application settings
      operationId: updateSettings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSettingsRequest"
      responses:
        "200":
          description: Settings updated

  /api/user-settings:
    get:
      summary: Get user settings (theme, language)
      operationId: getUserSettings
      responses:
        "200":
          description: User settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSettingsDTO"
    put:
      summary: Update user settings
      operationId: updateUserSettings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserSettingsRequest"
      responses:
        "200":
          description: User settings updated

  /api/sync-status:
    get:
      summary: Get background sync status
      operationId: getSyncStatus
      responses:
        "200":
          description: Sync status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncStatusResponse"

  /api/exif-status:
    get:
      summary: Get EXIF service connection status
      operationId: getExifStatus
      responses:
        "200":
          description: EXIF status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExifStatusResponse"

  # ──────────────────────────────────────────────
  #  Folders
  # ──────────────────────────────────────────────

  /api/folders:
    get:
      summary: List gallery folders
      operationId: getFolders
      responses:
        "200":
          description: Folders list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GalleryFoldersResponse"
    post:
      summary: Add gallery folder
      operationId: addFolder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddFolderRequest"
      responses:
        "200":
          description: Folder added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddFolderResponse"

  /api/folders/mkdir:
    post:
      summary: Create subfolder inside a gallery folder
      operationId: createSubfolder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFolderRequest"
      responses:
        "200":
          description: Subfolder created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateFolderResponse"

  /api/folders/subdirs:
    get:
      summary: List subdirectories of a gallery folder
      operationId: listSubdirs
      parameters:
        - name: path
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Subdirectories
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubdirsResponse"

  /api/folders/{id}:
    delete:
      summary: Remove gallery folder
      operationId: removeFolder
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Folder removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RemoveFolderResponse"

  # ──────────────────────────────────────────────
  #  Trash
  # ──────────────────────────────────────────────

  /api/trash-info:
    get:
      summary: Get trash directory info
      operationId: getTrashInfo
      responses:
        "200":
          description: Trash info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrashInfoResponse"

  /api/trash-clean:
    post:
      summary: Clean trash directory
      operationId: cleanTrash
      responses:
        "200":
          description: Trash cleaned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CleanTrashResponse"

  /api/trash-list:
    get:
      summary: List files in trash
      operationId: listTrashFiles
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Trash files list
          content:
            application/json:
              schema:
                type: object
                properties:
                  files:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        path:
                          type: string
                        deletedAt:
                          type: string
                          format: date-time
                        size:
                          type: integer
                  total:
                    type: integer

  /api/trash-restore:
    post:
      summary: Restore file from trash
      operationId: restoreTrashFile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path]
              properties:
                path:
                  type: string
      responses:
        "200":
          description: File restored

  /api/trash-delete:
    post:
      summary: Permanently delete file from trash
      operationId: deleteTrashFile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path]
              properties:
                path:
                  type: string
      responses:
        "200":
          description: File permanently deleted

  # ──────────────────────────────────────────────
  #  Image Metadata & GPS
  # ──────────────────────────────────────────────

  /api/image-metadata:
    get:
      summary: Get EXIF metadata and geolocation for an image
      operationId: getImageMetadata
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: integer
          description: Image file ID
      responses:
        "200":
          description: Image metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImageMetadataResponse"

  /api/gallery/exif-images:
    get:
      summary: Get images missing EXIF data (date_taken or geolocation)
      operationId: getImagesMissingExif
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Missing EXIF images
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MissingImagesResponse"

  /api/geocode/search:
    get:
      summary: Forward geocode search via Nominatim
      operationId: geocodeSearch
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search query
      responses:
        "200":
          description: Geocode results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeocodeSearchResponse"

  /api/image-metadata/gps:
    put:
      summary: Write GPS coordinates to an image file
      operationId: updateGps
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateGpsRequest"
      responses:
        "200":
          description: GPS updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateGpsResponse"

  /api/image-metadata/gps/batch:
    put:
      summary: Batch write GPS coordinates to multiple images
      operationId: batchUpdateGps
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchUpdateGpsRequest"
      responses:
        "200":
          description: Batch GPS update result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchUpdateGpsResponse"

  /api/image-metadata/location-candidates:
    get:
      summary: Get location candidates from same-day photos with GPS
      operationId: getLocationCandidates
      parameters:
        - name: date
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Location candidates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocationCandidatesResponse"

  # ──────────────────────────────────────────────
  #  OCR
  # ──────────────────────────────────────────────

  /api/ocr-status:
    get:
      summary: Get OCR classifier service status
      operationId: getOcrStatus
      responses:
        "200":
          description: OCR status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OCRStatusResponse"

  /api/ocr/classify:
    post:
      summary: Start OCR classification for all images
      operationId: startOcrClassification
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                force:
                  type: boolean
                  description: Re-classify already classified images
      responses:
        "202":
          description: OCR classification started

  /api/ocr/classify-changes:
    post:
      summary: Start incremental OCR classification (changed images only)
      operationId: startOcrClassificationIncremental
      responses:
        "202":
          description: Incremental OCR started

  /api/ocr/stop:
    post:
      summary: Stop OCR classification
      operationId: stopOcrClassification
      responses:
        "200":
          description: OCR stopped

  /api/ocr/classify-status:
    get:
      summary: Get OCR classification status
      operationId: getOcrClassificationStatus
      responses:
        "200":
          description: OCR status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OcrClassificationStatusResponse"

  /api/ocr/documents:
    get:
      summary: Get images classified as text documents
      operationId: getOcrDocuments
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: OCR documents
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OcrDocumentsResponse"

  /api/ocr/data:
    get:
      summary: Get OCR data for an image
      operationId: getOcrData
      parameters:
        - name: imageFileId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OCR data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OcrDataResponse"

  # ──────────────────────────────────────────────
  #  LLM OCR
  # ──────────────────────────────────────────────

  /api/llm/settings:
    get:
      summary: Get LLM settings
      operationId: getLlmSettings
      responses:
        "200":
          description: LLM settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LlmSettingsResponse"
    put:
      summary: Update LLM settings
      operationId: updateLlmSettings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLlmSettingsRequest"
      responses:
        "200":
          description: LLM settings updated

  /api/llm/providers:
    post:
      summary: Create LLM provider
      operationId: createLlmProvider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLlmProviderRequest"
      responses:
        "201":
          description: Provider created

  /api/llm/providers/{alias}:
    put:
      summary: Update LLM provider
      operationId: updateLlmProvider
      parameters:
        - name: alias
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLlmProviderRequest"
      responses:
        "200":
          description: Provider updated
    delete:
      summary: Delete LLM provider
      operationId: deleteLlmProvider
      parameters:
        - name: alias
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Provider deleted

  /api/llm/recognize:
    post:
      summary: Start LLM-based OCR recognition for an image
      operationId: llmRecognize
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LlmOcrRequest"
      responses:
        "200":
          description: Recognition started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LlmOcrResponse"

  /api/llm/recognize-status:
    get:
      summary: Get LLM OCR recognition status
      operationId: llmRecognizeStatus
      parameters:
