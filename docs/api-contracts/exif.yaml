openapi: "3.1.0"
info:
  title: EXIF Microservice API
  version: "1.2.0"
  description: >
    REST API for image metadata extraction, GPS writing, location candidates,
    calendar gallery, geo-points clustering, geolocation resolution, preview
    extraction, and EXIF copying between files.

servers:
  - url: http://localhost:5172
    description: Local development

paths:
  /exif/health:
    get:
      summary: Service health check
      operationId: getHealth
      responses:
        "200":
          description: Service health status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /exif/metadata:
    get:
      summary: Read EXIF metadata from file or database
      operationId: getMetadata
      parameters:
        - name: path
          in: query
          required: false
          schema:
            type: string
          description: Absolute file path (reads from file). Mutually exclusive with imageFileId.
        - name: imageFileId
          in: query
          required: false
          schema:
            type: integer
          description: Image file ID (reads from database). Mutually exclusive with path.
      responses:
        "200":
          description: EXIF metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetadataResponse"
        "400":
          description: Missing or invalid parameters (at least one of path or imageFileId required)
        "500":
          description: Internal error
    put:
      summary: Upsert image metadata in database
      operationId: upsertMetadata
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertMetadataRequest"
      responses:
        "200":
          description: Metadata upserted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpsertMetadataResponse"
        "400":
          description: Invalid request body
        "500":
          description: Internal error

  /exif/metadata/{imageFileId}:
    delete:
      summary: Delete metadata for an image
      operationId: deleteMetadata
      parameters:
        - name: imageFileId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Metadata deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteMetadataResponse"
        "400":
          description: Invalid imageFileId
        "500":
          description: Internal error

  /exif/metadata/batch:
    get:
      summary: Batch retrieve metadata for multiple image IDs
      operationId: getMetadataBatch
      parameters:
        - name: ids
          in: query
          required: true
          schema:
            type: string
          description: Comma-separated list of image file IDs
      responses:
        "200":
          description: Batch metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetadataBatchResponse"
        "400":
          description: Invalid ids parameter
        "500":
          description: Internal error

  /exif/metadata/calendar:
    get:
      summary: Calendar gallery with cursor-based pagination
      operationId: getCalendar
      parameters:
        - name: startDate
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Start date (YYYY-MM-DD)
        - name: endDate
          in: query
          required: false
          schema:
            type: string
            format: date
          description: End date (YYYY-MM-DD)
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            default: 30
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: Base64-encoded cursor "(date_taken|image_file_id)" for pagination
      responses:
        "200":
          description: Calendar items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarResponse"
        "400":
          description: Invalid parameters
        "500":
          description: Internal error

  /exif/metadata/geo-points:
    get:
      summary: GPS points for clustering within bounding box
      operationId: getGeoPoints
      parameters:
        - name: minLat
          in: query
          required: false
          schema:
            type: number
        - name: maxLat
          in: query
          required: false
          schema:
            type: number
        - name: minLng
          in: query
          required: false
          schema:
            type: number
        - name: maxLng
          in: query
          required: false
          schema:
            type: number
      responses:
        "200":
          description: Geo points
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeoPointsResponse"
        "500":
          description: Internal error

  /exif/preview:
    get:
      summary: Extract embedded preview/thumbnail image from a file using exiftool
      operationId: getPreview
      parameters:
        - name: path
          in: query
          required: true
          schema:
            type: string
          description: Absolute file path
      responses:
        "200":
          description: Preview image bytes (JPEG)
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
        "400":
          description: Missing path parameter
        "404":
          description: Preview not found
        "500":
          description: Internal error

  /exif/missing:
    get:
      summary: List images missing EXIF data (date_taken or geolocation_ref)
      operationId: getMissingImages
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Missing images list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MissingImagesResponse"
        "500":
          description: Internal error

  /exif/geolocation:
    get:
      summary: Resolve GPS coordinates to location names (with caching via Nominatim)
      operationId: resolveGeolocation
      parameters:
        - name: lat
          in: query
          required: true
          schema:
            type: number
        - name: lng
          in: query
          required: true
          schema:
            type: number
      responses:
        "200":
          description: Geolocation data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeolocationResponse"
        "400":
          description: Missing or invalid parameters
        "500":
          description: Internal error

  /exif/gps:
    put:
      summary: Write GPS coordinates to a single image file
      operationId: updateGPS
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GPSRequest"
      responses:
        "200":
          description: GPS written successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GPSResponse"
        "500":
          description: Write error

  /exif/gps/batch:
    put:
      summary: Batch GPS write to multiple image files
      operationId: batchUpdateGPS
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GPSBatchRequest"
      responses:
        "200":
          description: Batch result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GPSBatchResponse"

  /exif/location-candidates:
    get:
      summary: Suggest locations from same-day photos with GPS
      operationId: getLocationCandidates
      parameters:
        - name: date
          in: query
          required: true
          schema:
            type: string
            format: date
          description: Date in YYYY-MM-DD format
      responses:
        "200":
          description: Location candidates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocationCandidatesResponse"
        "400":
          description: Missing or invalid date parameter

  /exif/copy-exif:
    post:
      summary: Copy all EXIF metadata (including GPS) from source to target file
      operationId: copyExif
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CopyExifRequest"
      responses:
        "200":
          description: EXIF copied successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CopyExifResponse"
        "400":
          description: Invalid request body
        "500":
          description: Internal error

components:
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: healthy
        version:
          type: string
          example: "1.0.0"
        exiftoolAvailable:
          type: boolean
        databaseConnected:
          type: boolean
        uptime:
          type: string
          example: "2h30m"

    MetadataResponse:
      type: object
      properties:
        width:
          type: integer
        height:
          type: integer
        cameraModel:
          type: string
        lensModel:
          type: string
        iso:
          type: integer
        aperture:
          type: string
        shutterSpeed:
          type: string
        focalLength:
          type: string
        dateTaken:
          type: string
          format: date-time
        orientation:
          type: integer
        colorSpace:
          type: string
        software:
          type: string
        gpsLatitude:
          type: number
          nullable: true
        gpsLongitude:
          type: number
          nullable: true

    UpsertMetadataRequest:
      type: object
      required:
        - imageFileId
      properties:
        imageFileId:
          type: integer
        width:
          type: integer
        height:
          type: integer
        cameraModel:
          type: string
        lensModel:
          type: string
        iso:
          type: integer
        aperture:
          type: string
        shutterSpeed:
          type: string
        focalLength:
          type: string
        dateTaken:
          type: string
          format: date-time
          nullable: true
        orientation:
          type: integer
        colorSpace:
          type: string
        software:
          type: string
        geolocationRef:
          type: integer
          nullable: true

    UpsertMetadataResponse:
      type: object
      properties:
        id:
          type: integer
        imageFileId:
          type: integer
        width:
          type: integer
        height:
          type: integer
        cameraModel:
          type: string
        lensModel:
          type: string
        iso:
          type: integer
        aperture:
          type: string
        shutterSpeed:
          type: string
        focalLength:
          type: string
        dateTaken:
          type: string
          format: date-time
          nullable: true
        orientation:
          type: integer
        colorSpace:
          type: string
        software:
          type: string
        geolocationRef:
          type: integer
          nullable: true

    DeleteMetadataResponse:
      type: object
      properties:
        deleted:
          type: boolean

    MetadataBatchResponse:
      type: object
      properties:
        metadata:
          type: array
          items:
            $ref: "#/components/schemas/MetadataResponse"

    CalendarResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CalendarItem"
        nextCursor:
          type: string
        minDate:
          type: string
        maxDate:
          type: string
        totalWithDate:
          type: integer

    CalendarItem:
      type: object
      properties:
        imageFileId:
          type: integer
        dateTaken:
          type: string
          format: date-time
        geolocationRef:
          type: integer
          nullable: true
        gpsLatitude:
          type: number
        gpsLongitude:
          type: number
        nameLocal:
          type: string
        nameEng:
          type: string

    GeoPointsResponse:
      type: object
      properties:
        points:
          type: array
          items:
            $ref: "#/components/schemas/GeoPointItem"

    GeoPointItem:
      type: object
      properties:
        imageFileId:
          type: integer
        path:
          type: string
        gpsLatitude:
          type: number
        gpsLongitude:
          type: number
        nameLocal:
          type: string
        nameEng:
          type: string

    GeolocationResponse:
      type: object
      properties:
        id:
          type: integer
        gpsLatitude:
          type: number
        gpsLongitude:
          type: number
        nameLocal:
          type: string
        nameEng:
          type: string

    MissingImagesResponse:
      type: object
      properties:
        images:
          type: array
          items:
            $ref: "#/components/schemas/MissingImageItem"
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer

    MissingImageItem:
      type: object
      properties:
        imageFileId:
          type: integer
        missingDate:
          type: boolean
        missingGps:
          type: boolean

    GPSRequest:
      type: object
      required:
        - path
        - backupDir
      properties:
        path:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        backupDir:
          type: string
          description: Directory for backup before modification

    GPSResponse:
      type: object
      properties:
        success:
          type: boolean
        latitude:
          type: number
        longitude:
          type: number

    GPSBatchRequest:
      type: object
      required:
        - items
        - backupDir
      properties:
        items:
          type: array
          items:
            type: object
            required:
              - path
            properties:
              path:
                type: string
              latitude:
                type: number
              longitude:
                type: number
        backupDir:
          type: string

    GPSBatchResponse:
      type: object
      properties:
        success:
          type: integer
        failed:
          type: integer
        failedFiles:
          type: array
          items:
            type: string

    LocationCandidatesResponse:
      type: object
      properties:
        candidates:
          type: array
          items:
            type: object
            properties:
              lat:
                type: number
              lng:
                type: number
              nameLocal:
                type: string
              nameEng:
                type: string
              photoCount:
                type: integer

    CopyExifRequest:
      type: object
      required:
        - sourcePath
        - targetPath
      properties:
        sourcePath:
          type: string
        targetPath:
          type: string

    CopyExifResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
